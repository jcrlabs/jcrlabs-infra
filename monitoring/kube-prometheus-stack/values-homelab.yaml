# kube-prometheus-stack values para jcrlabs homelab (k3d)
# Storage: local-path provisioner (rancher.io/local-path)
# Disco disponible estimado: ~500Gi | Usado en cluster: ~30Gi (minio+postgres)

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    general: true
    kubeApiserverAvailability: true
    kubelet: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true

# k3s no expone estos componentes igual que kubeadm
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 512Mi

grafana:
  enabled: true
  adminPassword: "changeme"
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    hosts:
      - grafana.jcrlabs.net
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.jcrlabs.net
  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy

prometheus:
  prometheusSpec:
    retention: 7d
    # ~500MB/dia en cluster pequeno con 6 nodos y pocos servicios
    retentionSize: "4GB"
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

prometheusOperator:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
