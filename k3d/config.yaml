# k3d cluster config — refleja el cluster jcrlabs actual
# Recrear: k3d cluster create --config k3d/config.yaml
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: jcrlabs

servers: 3
agents: 3

image: rancher/k3s:v1.31.5-k3s1

ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer

options:
  k3d:
    wait: true
    timeout: 120s
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
