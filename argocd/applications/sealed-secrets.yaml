apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-store
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: portfolio
  source:
    repoURL: https://github.com/jcrlabs/jcrlabs-infra.git
    targetRevision: main
    path: k8s/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
