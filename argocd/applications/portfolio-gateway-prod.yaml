apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: portfolio
  source:
    repoURL: https://github.com/jcrlabs/portfolio-gateway.git
    targetRevision: main
    path: deploy/helm
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # ghcr-pull-secret is owned exclusively by portfolio-landing; ignore it here
  # to avoid SharedResourceWarning caused by SSA field-manager entries from both apps.
  ignoreDifferences:
    - group: bitnami.com
      kind: SealedSecret
      name: ghcr-pull-secret
      namespace: portfolio
