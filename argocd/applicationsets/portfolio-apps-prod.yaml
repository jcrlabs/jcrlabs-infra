apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: portfolio-apps-prod
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/jonathanCaamano/jcrlabs-infra.git
        revision: HEAD
        directories:
          - path: "k8s/apps/*/"
  template:
    metadata:
      name: "{{ .path.basename }}"
      labels:
        env: production
        project: "{{ .path.basename }}"
    spec:
      project: portfolio
      source:
        repoURL: https://github.com/jonathanCaamano/jcrlabs-infra.git
        targetRevision: HEAD
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .path.basename }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
