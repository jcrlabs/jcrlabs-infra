name: Build RedKey Operator

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone redkeyoperator
        run: git clone --depth=1 https://github.com/InditexTech/redkeyoperator.git

      - name: Build & push redkey-operator
        run: |
          cd redkeyoperator
          docker build -t ghcr.io/jcrlabs/redkey-operator:0.1.0 .
          docker push ghcr.io/jcrlabs/redkey-operator:0.1.0
