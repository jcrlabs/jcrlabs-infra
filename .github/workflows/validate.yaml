name: Validate IaC

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      # Solo linta manifests K8s y ArgoCD (no Helm values)
      - run: yamllint -d relaxed k8s/ argocd/

  check-secrets:
    name: No plaintext secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if grep -rl --include='*.yaml' 'kind: Secret' k8s/ \
               | xargs grep -L 'SealedSecret' 2>/dev/null | grep .; then
            echo "ERROR: plaintext Secret encontrado. Usa Sealed Secrets."
            exit 1
          fi
          echo "OK: no plaintext secrets."
