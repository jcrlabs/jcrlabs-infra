name: Validate IaC

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yaml \
            ansible/ k8s/ argocd/ \
            monitoring/kube-prometheus-stack/ \
            monitoring/loki/ \
            monitoring/promtail/

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible + lint
        run: pip install ansible-lint ansible-core

      - name: Run ansible-lint
        run: ansible-lint ansible/playbooks/
        working-directory: ${{ github.workspace }}

  kubeconform:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Validate core K8s manifests
        run: |
          find k8s/namespaces/ k8s/metallb/ k8s/cert-manager/ -name '*.yaml' \
            ! -name 'kustomization.yaml' \
            | xargs kubeconform \
                -strict \
                -ignore-missing-schemas \
                -kubernetes-version 1.30.0 \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: Validate ArgoCD manifests
        run: |
          find argocd/ -name '*.yaml' ! -name 'kustomization.yaml' \
            | xargs kubeconform \
                -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  check-secrets:
    name: No plaintext secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect plaintext Kubernetes Secrets
        run: |
          if grep -r --include='*.yaml' 'kind: Secret' k8s/ \
               | grep -v 'kind: SealedSecret' \
               | grep -v 'kind: SecretStore' \
               | grep -v '#'; then
            echo "ERROR: Found plaintext Kubernetes Secret. Use Sealed Secrets."
            exit 1
          fi
          echo "OK: no plaintext secrets found."
