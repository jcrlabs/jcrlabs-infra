name: "Bootstrap: Install ArgoCD"

# Workflow manual para instalar ArgoCD + Sealed Secrets
# sobre el cluster k3d ya existente.
# Solo se ejecuta una vez (o cuando quieras reinstalar).
# NO toca el namespace taller-inventario ni nada existente.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe INSTALL para confirmar"
        required: true

jobs:
  check-existing:
    name: "Verificar que el cluster funciona"
    runs-on: ubuntu-latest
    steps:
      - name: Health check tallerjcr.jcrlabs.net
        run: |
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            https://tallerjcr.jcrlabs.net)
          echo "HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 500 ]; then
            echo "::error::tallerjcr.jcrlabs.net no responde antes de instalar. Abortar."
            exit 1
          fi
          echo "OK: cluster activo antes de instalar ArgoCD"

  install-argocd:
    name: "Instalar ArgoCD + Sealed Secrets"
    runs-on: [self-hosted, homelab]
    needs: check-existing
    steps:
      - name: Validar confirmacion
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "INSTALL" ]; then
            echo "::error::Debes escribir INSTALL para confirmar"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Verificar que ArgoCD no está ya instalado
        run: |
          if kubectl get namespace argocd &>/dev/null; then
            echo "::warning::ArgoCD ya existe en el cluster. Continuando con upgrade..."
          else
            echo "ArgoCD no instalado. Procediendo con instalacion fresca."
          fi

      - name: Add helm repos
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
          helm repo update

      - name: Instalar Sealed Secrets
        run: |
          helm upgrade --install sealed-secrets sealed-secrets/sealed-secrets \
            --namespace sealed-secrets \
            --create-namespace \
            --set fullnameOverride=sealed-secrets-controller \
            --atomic \
            --timeout 3m

      - name: Instalar ArgoCD
        run: |
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --set configs.params.server\.insecure=true \
            --set server.ingress.enabled=true \
            --set server.ingress.ingressClassName=nginx \
            --set 'server.ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-cloudflare' \
            --set 'server.ingress.hosts[0]=argocd.jcrlabs.net' \
            --set 'server.ingress.tls[0].secretName=argocd-tls' \
            --set 'server.ingress.tls[0].hosts[0]=argocd.jcrlabs.net' \
            --atomic \
            --timeout 5m

      - name: Esperar a que ArgoCD esté listo
        run: kubectl rollout status deployment/argocd-server -n argocd --timeout=180s

      - name: Aplicar AppProject y ApplicationSets
        run: kubectl apply -k argocd/

      - name: Obtener password inicial de ArgoCD
        run: |
          echo "=== ArgoCD listo ==="
          echo "URL: https://argocd.jcrlabs.net"
          echo "User: admin"
          PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          echo "Pass: $PASS"

      - name: Health check final
        run: |
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            https://tallerjcr.jcrlabs.net)
          echo "HTTP tallerjcr.jcrlabs.net: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 500 ]; then
            echo "::error::tallerjcr.jcrlabs.net NO responde tras instalar ArgoCD"
            exit 1
          fi
          echo "OK: tallerjcr.jcrlabs.net sigue activo tras la instalacion"
