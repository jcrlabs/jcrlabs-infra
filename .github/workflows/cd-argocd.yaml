name: CD — Sync ArgoCD

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - 'argocd/**'
      - 'monitoring/**'

jobs:
  argocd-sync:
    name: Notify ArgoCD webhook
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ArgoCD GitHub webhook
        run: |
          # ArgoCD escucha en /api/webhook el evento push de GitHub.
          # Configura el secret en: ArgoCD Settings > Webhooks > GitHub
          # y guárdalo en el secret ARGOCD_WEBHOOK_SECRET de este repo.
          #
          # Si usas ArgoCD con acceso público o VPN al homelab,
          # descomenta y ajusta la URL:
          #
          # curl -s -o /dev/null -w "%{http_code}" \
          #   -X POST https://argocd.jcrlabs.net/api/webhook \
          #   -H "Content-Type: application/json" \
          #   -H "X-GitHub-Event: push" \
          #   -H "X-Hub-Signature-256: sha256=$(echo -n '${{ github.event.after }}' | openssl dgst -sha256 -hmac '${{ secrets.ARGOCD_WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
          #   -d '{"ref": "refs/heads/main"}'

          echo "ArgoCD ApplicationSets poll automáticamente cada 3 min."
          echo "Para sync inmediato: configura el webhook de GitHub en ArgoCD UI"
          echo "  Settings > Repositories > {repo} > Edit > Webhook URL:"
          echo "  https://argocd.jcrlabs.net/api/webhook"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
