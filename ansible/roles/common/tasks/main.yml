---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common utilities
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - net-tools
      - nfs-common
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Configure SSH hardening
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
  notify: restart sshd

- name: Configure UFW - allow SSH
  ufw:
    rule: allow
    name: OpenSSH

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

handlers:
  - name: restart sshd
    systemd:
      name: sshd
      state: restarted
