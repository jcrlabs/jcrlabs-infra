---
- name: Join worker nodes to cluster
  hosts: workers
  become: true
  roles:
    - kubernetes
  tasks:
    - name: Add Kubernetes GPG key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
        state: present

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
        state: present

    - name: Install kubeadm and kubelet
      apt:
        name:
          - kubelet
          - kubeadm
        state: present
        update_cache: true

    - name: Check if node already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: node_joined

    - name: Join the cluster
      command: "{{ hostvars[groups['control_plane'][0]]['kubeadm_join_command'] }}"
      when: not node_joined.stat.exists
