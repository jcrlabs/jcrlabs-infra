---
# Crea el cluster k3d usando el fichero de config
- name: Create k3d cluster
  hosts: k3d_host
  become: false
  tasks:
    - name: Check if cluster already exists
      command: k3d cluster get {{ k3d_cluster_name }}
      register: cluster_exists
      failed_when: false
      changed_when: false

    - name: Create k3d cluster from config
      command: k3d cluster create --config {{ playbook_dir }}/../../k3d/config.yaml
      when: cluster_exists.rc != 0

    - name: Export kubeconfig
      command: k3d kubeconfig merge {{ k3d_cluster_name }} --kubeconfig-merge-default
      changed_when: true

    - name: Wait for all nodes to be Ready
      command: kubectl wait --for=condition=Ready nodes --all --timeout=120s
      changed_when: false
