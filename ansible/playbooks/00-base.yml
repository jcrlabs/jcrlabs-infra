---
- name: Base OS — paquetes, sysctl y swap
  hosts: homelab
  become: true
  tags: base

  tasks:
    - name: Deshabilitar swap (sesión actual)
      command: swapoff -a
      changed_when: false

    - name: Eliminar swap de /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Cargar módulos de kernel necesarios
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persistir módulos de kernel
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'

    - name: Configurar sysctl para K8s
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { name: net.ipv4.ip_forward,                 value: "1" }

    - name: Instalar paquetes base
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - jq
          - socat
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - zsh
          - vim
          - htop
          - build-essential
          - python3-yaml
        state: present
        update_cache: true
