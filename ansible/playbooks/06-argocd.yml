---
- name: ArgoCD — instalar + aplicar root app (sync jcrlabs-infra)
  hosts: homelab
  become: false
  tags: argocd
  environment:
    KUBECONFIG: "/home/{{ cluster_user }}/.kube/config"

  tasks:
    - name: Añadir repo argo
      command: helm repo add argo https://argoproj.github.io/argo-helm
      changed_when: false

    - name: Actualizar repos de Helm
      command: helm repo update
      changed_when: false

    - name: Renderizar values de ArgoCD con el dominio correcto
      template:
        src: "{{ playbook_dir }}/../files/argocd/values.yml.j2"
        dest: /tmp/argocd-values.yml
        mode: '0644'

    - name: Instalar ArgoCD
      command: >
        helm upgrade --install argocd argo/argo-cd
        --namespace {{ argocd_namespace }}
        --create-namespace
        --version {{ argocd_version }}
        --values /tmp/argocd-values.yml
        --wait --timeout 5m
      register: argo_result
      changed_when: "'has been upgraded' in argo_result.stdout or 'has been deployed' in argo_result.stdout"

    - name: Esperar a que ArgoCD esté listo
      command: kubectl rollout status deployment/argocd-server -n {{ argocd_namespace }} --timeout=3m
      changed_when: false

    - name: Obtener password inicial de ArgoCD
      command: >
        kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret
        -o jsonpath="{.data.password}"
      register: argo_pass_b64
      changed_when: false

    - name: Mostrar password inicial de ArgoCD
      debug:
        msg: "ArgoCD admin password: {{ argo_pass_b64.stdout | b64decode }}"

    # ── Root app → sincroniza todo jcrlabs-infra ─────────────────────────────
    - name: Aplicar ArgoCD root app (AppProject + Applications)
      command: kubectl apply -k {{ infra_repo }}/argocd/
      changed_when: true
