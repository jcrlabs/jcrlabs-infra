---
# CRÍTICO: restaura la clave maestra del backup ANTES de instalar el controller.
# Así todos los SealedSecrets existentes en jcrlabs-infra siguen funcionando.
- name: Sealed Secrets — restaurar clave maestra + instalar controller
  hosts: homelab
  become: false
  tags: sealed-secrets
  environment:
    KUBECONFIG: "/home/{{ cluster_user }}/.kube/config"

  tasks:
    - name: Verificar que el backup de la clave maestra existe
      stat:
        path: "{{ sealed_secrets_backup }}"
      register: ss_backup
      failed_when: not ss_backup.stat.exists

    - name: Crear namespace sealed-secrets
      command: kubectl create namespace {{ sealed_secrets_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    # Restaurar la clave ANTES de que el controller la genere nueva
    - name: Restaurar clave maestra de Sealed Secrets desde backup
      command: kubectl apply -f {{ sealed_secrets_backup }}
      changed_when: true

    - name: Añadir repo de sealed-secrets
      command: helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
      changed_when: false

    - name: Actualizar repos de Helm
      command: helm repo update
      changed_when: false

    - name: Instalar sealed-secrets controller
      command: >
        helm upgrade --install sealed-secrets sealed-secrets/sealed-secrets
        --namespace {{ sealed_secrets_namespace }}
        --version {{ sealed_secrets_version }}
        --set fullnameOverride=sealed-secrets-controller
        --wait --timeout 3m
      register: ss_result
      changed_when: "'has been upgraded' in ss_result.stdout or 'has been deployed' in ss_result.stdout"

    - name: Esperar a que el controller esté listo
      command: kubectl rollout status deployment/sealed-secrets-controller -n {{ sealed_secrets_namespace }} --timeout=2m
      changed_when: false

    - name: Exportar nueva clave pública (para sellar nuevos secrets)
      command: >
        kubeseal --fetch-cert
        --controller-name=sealed-secrets-controller
        --controller-namespace={{ sealed_secrets_namespace }}
      register: pub_cert
      changed_when: false

    - name: Guardar clave pública en ~/pub-cert.pem
      copy:
        content: "{{ pub_cert.stdout }}"
        dest: "/home/{{ cluster_user }}/pub-cert.pem"
        mode: '0644'
