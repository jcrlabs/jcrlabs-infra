---
all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:
    control_plane:
      hosts:
        k8s-master:
          ansible_host: 192.168.1.10

    workers:
      hosts:
        k8s-worker-01:
          ansible_host: 192.168.1.11
        k8s-worker-02:
          ansible_host: 192.168.1.12

    k8s_cluster:
      children:
        control_plane:
        workers:
