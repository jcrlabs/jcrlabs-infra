apiVersion: v1
kind: Service
metadata:
  name: blog-mongodb
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-mongodb
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app.kubernetes.io/name: blog-mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blog-mongodb
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-mongodb
    app.kubernetes.io/managed-by: argocd
spec:
  serviceName: blog-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-mongodb
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:8.0
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
