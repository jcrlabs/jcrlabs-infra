# Genera este fichero con:
#
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<github-user> \
#     --docker-password=<ghp_PAT_read:packages> \
#     --namespace=portfolio \
#     --dry-run=client -o yaml \
#   | kubeseal \
#       --controller-namespace sealed-secrets \
#       --controller-name sealed-secrets-controller \
#       --scope cluster-wide \
#       --format yaml
#
# El scope cluster-wide permite que Sealed Secrets controller
# deselle este secret en CUALQUIER namespace sin necesidad de
# crear uno por namespace.
#
# Sustituye el bloque encryptedData con la salida de kubeseal.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-pull-secret
  namespace: portfolio
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  template:
    metadata:
      name: ghcr-pull-secret
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
    type: kubernetes.io/dockerconfigjson
  encryptedData:
    .dockerconfigjson: REPLACE_WITH_KUBESEAL_OUTPUT
