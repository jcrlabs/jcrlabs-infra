apiVersion: v1
kind: ServiceAccount
metadata:
  name: redkey-operator-sa
  namespace: redkey-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: redkey-operator-role
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
- apiGroups: [""]
  resources: [configmap, pods, services]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [configmaps, services]
  verbs: [create, delete, get, list]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [""]
  resources: [secrets]
  verbs: [get]
- apiGroups: [""]
  resources: [persistentvolumeclaims]
  verbs: [get, list, watch, delete, deletecollection]
- apiGroups: [apps]
  resources: [deployments, statefulsets]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [policy]
  resources: [poddisruptionbudgets]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [redkey.inditex.dev]
  resources: [redkeyclusters]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [redkey.inditex.dev]
  resources: [redkeyclusters/finalizers]
  verbs: [update]
- apiGroups: [redkey.inditex.dev]
  resources: [redkeyclusters/status]
  verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: redkey-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: redkey-operator-role
subjects:
- kind: ServiceAccount
  name: redkey-operator-sa
  namespace: redkey-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leader-election-role
  namespace: redkey-system
rules:
- apiGroups: ["", coordination.k8s.io]
  resources: [configmaps, leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leader-election-rolebinding
  namespace: redkey-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: leader-election-role
subjects:
- kind: ServiceAccount
  name: redkey-operator-sa
  namespace: redkey-system
